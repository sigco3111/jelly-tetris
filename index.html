<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jelly Tetris — Soft-Body Physics</title>
<style>
  :root {
    --bg: #0a0a14;
    --panel: #14142a;
    --ink: #e7e7f0;
    --muted: #8b8ba8;
    --accent: #22d3ee;
    --danger: #ef4444;
    --good: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #stage {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 20px;
    background: linear-gradient(180deg, #0e0e1c 0%, #08080f 100%);
    border: 1px solid #1f1f38;
    border-radius: 14px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  #board-wrap {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 0 1px #1c1c34, 0 18px 40px rgba(0,0,0,0.5);
  }
  #board {
    display: block;
    background: var(--bg);
  }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(8, 8, 16, 0.85);
    backdrop-filter: blur(4px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink);
    z-index: 5;
    padding: 0 24px;
  }
  #overlay.on { display: flex; }
  #overlay h1 {
    font-size: 38px;
    letter-spacing: 6px;
    color: var(--danger);
    margin-bottom: 16px;
    text-shadow: 0 0 18px rgba(239, 68, 68, 0.4);
  }
  #overlay p { font-size: 15px; margin: 4px 0; color: var(--muted); }
  #overlay .final { font-size: 24px; color: var(--ink); margin: 8px 0 18px; font-weight: 700; }
  #overlay kbd {
    background: #1c1c34;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--accent);
  }
  #hud {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid #1f1f38;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .panel h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .row { display: flex; justify-content: space-between; align-items: baseline; }
  .row .lbl {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .row .v {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  #next-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a14;
    border-radius: 6px;
    padding: 4px;
  }
  #next { display: block; background: #0a0a14; border-radius: 4px; }
  .help {
    font-size: 11px;
    line-height: 1.7;
    color: var(--muted);
  }
  .help kbd {
    background: #1c1c34;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink);
    font-size: 10px;
  }
  .title {
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 2px;
    text-align: center;
    opacity: 0.85;
  }
  .subtitle {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div id="stage">
    <div>
      <div class="title">Jelly Tetris</div>
      <div class="subtitle">Soft-body physics</div>
      <div id="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay">
          <h1>GAME OVER</h1>
          <p>Final Score</p>
          <div class="final" id="final-score">0</div>
          <p>Press <kbd>R</kbd> to restart</p>
        </div>
      </div>
    </div>
    <div id="hud">
      <div class="panel">
        <div class="row"><span class="lbl">Score</span><span class="v" id="hud-score">0</span></div>
        <div class="row"><span class="lbl">Lines</span><span class="v" id="hud-lines">0</span></div>
        <div class="row"><span class="lbl">Level</span><span class="v" id="hud-level">1</span></div>
      </div>
      <div class="panel">
        <h2>Next</h2>
        <div id="next-wrap">
          <canvas id="next" width="120" height="120"></canvas>
        </div>
      </div>
      <div class="panel help">
        <h2>Controls</h2>
        <div><kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move</div>
        <div><kbd>&darr;</kbd> Soft drop</div>
        <div><kbd>&uarr;</kbd> / <kbd>X</kbd> Rotate</div>
        <div><kbd>Space</kbd> Hard drop</div>
        <div><kbd>R</kbd> Restart</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"
          onerror="this.onerror=null;this.src='https://unpkg.com/matter-js@0.20.0/build/matter.min.js'"></script>
  <script>
  (function () {
    'use strict';

    // ===================================================================
    //  Jelly Tetris — single-file implementation
    //  Each tetromino = 4 circle particles + constraints matching the
    //  canonical silhouette. Movement uses Body.setVelocity on every
    //  particle (atomic + physics-friendly). Lock via isStatic +
    //  Sleeping.set so locked stacks no longer stretch.
    // ===================================================================

    const { Engine, World, Bodies, Body, Composite, Constraint, Events, Sleeping, Vector } = Matter;

    // ----- Constants -----
    const CELL_SIZE = 30;
    const GRID_W = 10;
    const GRID_H = 20;
    const BOARD_PX_W = GRID_W * CELL_SIZE; // 300
    const BOARD_PX_H = GRID_H * CELL_SIZE; // 600
    const BOARD_X = 0;
    const BOARD_Y = 0;

    // Particle radius — large enough that adjacent cells overlap visually,
    // creating a connected jelly look without needing dense mesh fills.
    const PARTICLE_R = CELL_SIZE * 0.42;

    // Per-particle physics tuning. Constraints stay stiff enough that the
    // piece behaves as one jelly unit at rest, but springy enough that
    // impacts visibly compress it. Damping is high to kill oscillation.
    const PARTICLE_DENSITY = 0.002;
    const PARTICLE_FRICTION_AIR = 0.06;
    const PARTICLE_RESTITUTION = 0.05;
    const PARTICLE_FRICTION = 0.15;
    const STIFF = 0.45;
    const DAMP = 0.55;

    // Falling: per-tick downward Δv. Soft drop multiplies this. Capped so a
    // collision never produces a velocity that snaps constraints.
    // Tuning: with our per-frame Engine.update(16.67ms), FALL_DV=0.25 → step
    // Δv≈4.2 px/step → terminal ≈250 px/s (general). Soft drop unlocks the
    // higher cap so the piece noticeably accelerates (≈1000 px/s) — feels like
    // a real "shove down" the way classic Tetris does.
    const FALL_DV = 0.25;
    const MAX_VY = 5.0;        // normal terminal velocity
    const SOFT_DROP_MULT = 12;  // per-tick dv × this when softDrop held
    const MAX_VY_SOFT = 18.0;   // higher cap while soft-dropping
    const MAX_VX = 6.0;

    // Lock detection: if a piece's particles have moved < LOCK_VEL_PX per
    // frame for LOCK_FRAMES consecutive frames while in the lower half of
    // the board, freeze it.
    const LOCK_VEL_PX = 0.25;
    const LOCK_FRAMES = 18;          // ~0.3 s at 60 fps
    const HARD_LOCK_MS = 4500;       // force-lock if a piece lives this long

    const COLORS = {
      I: '#22d3ee', // cyan
      O: '#facc15', // yellow
      T: '#a855f7', // purple
      S: '#22c55e', // green
      Z: '#ef4444', // red
      J: '#3b82f6', // blue
      L: '#fb923c', // orange
    };

    // ----- Tetromino bitmaps (rotation 0) -----
    // Each cell is occupied (1) or empty (0). Cells array indexed [y][x].
    // We also define, for each tetromino, the canonical PARTICLE ORDER.
    // The particle ORDER defines how constraints wire them — this guarantees
    // the renderer draws a stable tetromino shape regardless of which cell
    // index a particle currently occupies in world space.
    //
    // Convention: particle index 0 is the "anchor" cell (top-left of the
    // bounding box for L, T, S, Z, J; leftmost for I; top-left for O).
    const SHAPES = {
      I: {
        cells: [[1,1,1,1]],
        // Particle indices: 0..3 left-to-right
        particles: [
          { dx: 0, dy: 0 }, { dx: 1, dy: 0 }, { dx: 2, dy: 0 }, { dx: 3, dy: 0 },
        ],
        // Constraints: connect adjacent particles in canonical order
        constraints: [[0,1],[1,2],[2,3]],
        // 4x1
        w: 4, h: 1,
      },
      O: {
        cells: [[1,1],[1,1]],
        particles: [
          { dx: 0, dy: 0 }, { dx: 1, dy: 0 },
          { dx: 0, dy: 1 }, { dx: 1, dy: 1 },
        ],
        // Closed square — 4 edges + 2 diagonals for rigidity
        constraints: [[0,1],[1,3],[3,2],[2,0],[0,3],[1,2]],
        w: 2, h: 2,
      },
      T: {
        // 3 wide, 2 tall: top-middle + bottom-row full
        cells: [[0,1,0],[1,1,1]],
        particles: [
          { dx: 1, dy: 0 }, // top-center (index 0)
          { dx: 0, dy: 1 }, // bottom-left (index 1)
          { dx: 1, dy: 1 }, // bottom-center (index 2)
          { dx: 2, dy: 1 }, // bottom-right (index 3)
        ],
        // T-shape: top-center connects to bottom-center; bottom row all connected
        constraints: [[0,2],[1,2],[2,3]],
        w: 3, h: 2,
      },
      S: {
        // top-right 2 cells, bottom-left 2 cells
        cells: [[0,1,1],[1,1,0]],
        particles: [
          { dx: 1, dy: 0 }, // top-mid
          { dx: 2, dy: 0 }, // top-right
          { dx: 0, dy: 1 }, // bottom-left
          { dx: 1, dy: 1 }, // bottom-mid
        ],
        // S-shape: (1,0)-(2,0), (0,1)-(1,1), (1,0)-(1,1) joiner
        constraints: [[0,1],[2,3],[0,3]],
        w: 3, h: 2,
      },
      Z: {
        // top-left 2 cells, bottom-right 2 cells
        cells: [[1,1,0],[0,1,1]],
        particles: [
          { dx: 0, dy: 0 }, // top-left
          { dx: 1, dy: 0 }, // top-mid
          { dx: 1, dy: 1 }, // bottom-mid
          { dx: 2, dy: 1 }, // bottom-right
        ],
        // Z-shape: (0,0)-(1,0), (1,1)-(2,1), (1,0)-(1,1) joiner
        constraints: [[0,1],[2,3],[1,2]],
        w: 3, h: 2,
      },
      J: {
        // top-left cell + bottom row full
        cells: [[1,0,0],[1,1,1]],
        particles: [
          { dx: 0, dy: 0 }, // top-left (index 0)
          { dx: 0, dy: 1 }, // bottom-left
          { dx: 1, dy: 1 }, // bottom-mid
          { dx: 2, dy: 1 }, // bottom-right
        ],
        // L-corner: top-left connects to bottom-left; bottom row connected
        constraints: [[0,1],[1,2],[2,3]],
        w: 3, h: 2,
      },
      L: {
        // top-right cell + bottom row full
        cells: [[0,0,1],[1,1,1]],
        particles: [
          { dx: 2, dy: 0 }, // top-right (index 0)
          { dx: 0, dy: 1 }, // bottom-left
          { dx: 1, dy: 1 }, // bottom-mid
          { dx: 2, dy: 1 }, // bottom-right
        ],
        // L-corner: top-right connects to bottom-right; bottom row connected
        constraints: [[0,3],[1,2],[2,3]],
        w: 3, h: 2,
      },
    };

    const PIECE_TYPES = ['I','O','T','S','Z','J','L'];

    // ----- DOM -----
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next');
    const nextCtx = nextCanvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const finalScoreEl = document.getElementById('final-score');
    const hudScore = document.getElementById('hud-score');
    const hudLines = document.getElementById('hud-lines');
    const hudLevel = document.getElementById('hud-level');

    // ----- State -----
    const state = {
      engine: null,
      pieces: [],            // all live + locked pieces
      current: null,         // active falling piece
      bag: [],
      queue: [],             // preview
      score: 0,
      lines: 0,
      level: 1,
      softDrop: false,
      gameOver: false,
      hudTimer: 0,
      lockTimer: 0,
    };

    // ----- Engine init -----
    function initEngine() {
      const engine = Engine.create({
        positionIterations: 10,
        constraintIterations: 6,
        velocityIterations: 8,
      });
      engine.gravity.x = 0;
      engine.gravity.y = 0; // we drive gravity manually via setVelocity
      state.engine = engine;

      const wallT = 24;
      const wallH = BOARD_PX_H + 4 * CELL_SIZE;
      const wallY = BOARD_Y + BOARD_PX_H / 2;
      const left = Bodies.rectangle(
        BOARD_X - CELL_SIZE / 2 - wallT / 2,
        wallY,
        wallT, wallH,
        { isStatic: true, label: 'wall', friction: 0.2, restitution: 0.05 }
      );
      const right = Bodies.rectangle(
        BOARD_X + BOARD_PX_W + CELL_SIZE / 2 + wallT / 2,
        wallY,
        wallT, wallH,
        { isStatic: true, label: 'wall', friction: 0.2, restitution: 0.05 }
      );
      const floor = Bodies.rectangle(
        BOARD_X + BOARD_PX_W / 2,
        BOARD_Y + BOARD_PX_H + CELL_SIZE / 2,
        BOARD_PX_W + 4 * CELL_SIZE + wallT * 2,
        CELL_SIZE,
        { isStatic: true, label: 'floor', friction: 0.9, restitution: 0.0 }
      );
      Composite.add(engine.world, [left, right, floor]);
    }

    // ----- 7-bag randomizer -----
    function refillBag() {
      const arr = PIECE_TYPES.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      state.bag.push(...arr);
    }
    function nextPieceType() {
      if (state.bag.length === 0) refillBag();
      return state.bag.shift();
    }
    function ensureQueue() {
      while (state.queue.length < 4) state.queue.push(nextPieceType());
    }

    // ----- Tetromino creation -----
    function createTetromino(type, spawnX, spawnY) {
      const shape = SHAPES[type];
      const groupId = Body.nextGroup(true);
      const composite = Composite.create({ label: type });
      const particles = [];

      for (let i = 0; i < shape.particles.length; i++) {
        const p = shape.particles[i];
        const x = spawnX + p.dx * CELL_SIZE;
        const y = spawnY + p.dy * CELL_SIZE;
        const body = Bodies.circle(x, y, PARTICLE_R, {
          collisionFilter: { group: groupId },
          inertia: Infinity,
          friction: PARTICLE_FRICTION,
          frictionStatic: 0.3,
          frictionAir: PARTICLE_FRICTION_AIR,
          restitution: PARTICLE_RESTITUTION,
          density: PARTICLE_DENSITY,
          label: type,
          slop: 0.02,
        });
        body.plugin = { pieceIndex: i, role: 'live' };
        Composite.addBody(composite, body);
        particles.push(body);
      }

      // Wire canonical constraints
      for (const [a, b] of shape.constraints) {
        const A = particles[a];
        const B = particles[b];
        const dx = B.position.x - A.position.x;
        const dy = B.position.y - A.position.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const c = Constraint.create({
          bodyA: A, bodyB: B,
          length: len,
          stiffness: STIFF,
          damping: DAMP,
        });
        Composite.addConstraint(composite, c);
      }

      Composite.add(state.engine.world, composite);

      const piece = {
        type,
        shape,
        composite,
        groupId,
        particles,
        locked: false,
        bornAt: performance.now(),
        restCounter: 0, // frames below LOCK_VEL_PX threshold
      };
      state.pieces.push(piece);
      return piece;
    }

    // ----- Spawn -----
    function spawnPiece() {
      ensureQueue();
      const type = state.queue.shift();
      ensureQueue();
      const shape = SHAPES[type];
      // Center: align so the piece's bounding box is centered in the board.
      const spawnX = BOARD_X + (GRID_W / 2 - shape.w / 2) * CELL_SIZE;
      // Spawn ABOVE the board so the piece falls in.
      const spawnY = BOARD_Y - CELL_SIZE * 1.5;
      const piece = createTetromino(type, spawnX, spawnY);
      state.current = piece;
      state.softDrop = false;
      // Top-out check: if after a few frames the new piece is still jammed at
      // the very top AND locked pieces occupy the spawn area, end the game.
      // We delay the check so spawn jitter doesn't false-positive.
      scheduleTopOutCheck(piece);
    }

    function scheduleTopOutCheck(piece) {
      // Wait ~350 ms then check: is the piece still locked in the spawn row,
      // AND is the spawn row actually blocked by locked particles?
      setTimeout(() => {
        if (state.gameOver || piece !== state.current) return;
        // Compute the spawn-row coverage: how many of the piece's 4 particles
        // are still in the spawn region (y < 2*CELL_SIZE)?
        let stuckCount = 0;
        for (const b of piece.particles) {
          if (b.position.y < 2 * CELL_SIZE) stuckCount++;
        }
        if (stuckCount < 3) return; // piece is falling, no top-out
        // Are there locked particles in the spawn row at the piece's x range?
        const others = state.pieces.filter(p => p !== piece && p.locked);
        let blocked = false;
        for (const p of others) {
          for (const b of p.particles) {
            if (b.position.y >= 0 && b.position.y < 3 * CELL_SIZE) {
              // Particle in the spawn region — does it overlap with this piece?
              for (const myB of piece.particles) {
                const dx = myB.position.x - b.position.x;
                const dy = myB.position.y - b.position.y;
                if (dx * dx + dy * dy < (CELL_SIZE * 0.9) * (CELL_SIZE * 0.9)) {
                  blocked = true; break;
                }
              }
              if (blocked) break;
            }
          }
          if (blocked) break;
        }
        if (blocked) endGame();
      }, 350);
    }

    function endGame() {
      state.gameOver = true;
      finalScoreEl.textContent = String(state.score);
      overlay.classList.add('on');
    }

    // ----- Per-piece gravity (drive falling directly) -----
    function applyGravity() {
      const softDrop = state.softDrop;
      const dv = FALL_DV * (softDrop ? SOFT_DROP_MULT : 1);
      const vyCap = softDrop ? MAX_VY_SOFT : MAX_VY;
      for (const piece of state.pieces) {
        if (piece.locked) continue;
        for (const b of piece.particles) {
          const v = b.velocity;
          let ny = v.y + dv;
          if (ny > vyCap) ny = vyCap;
          if (ny < -vyCap) ny = -vyCap;
          let nx = v.x;
          if (nx > MAX_VX) nx = MAX_VX;
          if (nx < -MAX_VX) nx = -MAX_VX;
          Body.setVelocity(b, { x: nx, y: ny });
        }
      }
    }

    // ----- Settle / lock detection -----
    function pieceMaxY(piece) {
      let m = -Infinity;
      for (const b of piece.particles) {
        if (b.position.y > m) m = b.position.y;
      }
      return m;
    }
    function pieceAvgSpeed(piece) {
      let sum = 0;
      for (const b of piece.particles) {
        const v = b.velocity;
        sum += Math.sqrt(v.x * v.x + v.y * v.y);
      }
      return sum / piece.particles.length;
    }
    function pieceFullyOnFloorOrStack(piece) {
      // True if every particle has at least one contact point below it
      // (floor or another locked piece). We approximate by checking each
      // particle's bottom against the floor, OR a downward overlap with
      // any locked piece.
      const others = state.pieces.filter(p => p !== piece && p.locked);
      for (const b of piece.particles) {
        // Floor check
        if (b.position.y + PARTICLE_R < BOARD_PX_H - 0.5) {
          // Not on the floor itself — check stacked bodies
          let onStack = false;
          for (const p of others) {
            for (const o of p.particles) {
              const dx = Math.abs(b.position.x - o.position.x);
              const dy = o.position.y - b.position.y;
              if (dx < CELL_SIZE * 0.85 && dy > 0 && dy < PARTICLE_R * 2.4) {
                onStack = true; break;
              }
            }
            if (onStack) break;
          }
          if (!onStack) return false;
        }
      }
      return true;
    }
    function tryLockPiece(piece) {
      if (piece.locked) return;
      const speed = pieceAvgSpeed(piece);
      const onSurface = pieceFullyOnFloorOrStack(piece);
      const alive = performance.now() - piece.bornAt;
      if (onSurface && speed < LOCK_VEL_PX) {
        piece.restCounter++;
      } else {
        piece.restCounter = 0;
      }
      const shouldLock = piece.restCounter >= LOCK_FRAMES || alive > HARD_LOCK_MS;
      if (shouldLock) lockPiece(piece);
    }
    function lockPiece(piece) {
      if (piece.locked) return;
      piece.locked = true;
      // Freeze each particle. Static + Sleeping guarantees no integration
      // happens, AND static bodies still collide with dynamic ones (so
      // pieces pile on normally — exactly the same mechanism as walls).
      for (const b of piece.particles) {
        Body.setVelocity(b, { x: 0, y: 0 });
        Body.setAngularVelocity(b, 0);
        b.isStatic = true;
        Sleeping.set(b, true);
      }
      if (state.current === piece) state.current = null;
      // Top-out detection: if this piece locked with most of its particles
      // still in the spawn row AND there are locked particles overlapping
      // that spawn region, the column is full — game over.
      let maxY = -Infinity, stuckInSpawn = 0;
      for (const b of piece.particles) {
        if (b.position.y > maxY) maxY = b.position.y;
        if (b.position.y < 2 * CELL_SIZE) stuckInSpawn++;
      }
      if (!state.gameOver && stuckInSpawn >= 3 && state.pieces.length > 1) {
        let blockedInSpawn = false;
        for (const p of state.pieces) {
          if (p === piece) continue;
          for (const b of p.particles) {
            if (b.position.y >= 0 && b.position.y < 3 * CELL_SIZE) {
              for (const myB of piece.particles) {
                const dx = myB.position.x - b.position.x;
                const dy = myB.position.y - b.position.y;
                if (dx * dx + dy * dy < (CELL_SIZE * 0.9) * (CELL_SIZE * 0.9)) {
                  blockedInSpawn = true; break;
                }
              }
              if (blockedInSpawn) break;
            }
          }
          if (blockedInSpawn) break;
        }
        if (blockedInSpawn) {
          endGame();
          return;
        }
      }
      // Detect cleared rows after a brief breath
      setTimeout(detectAndClearRows, 60);
      // Spawn the next piece (we're not the active piece anymore)
      setTimeout(() => {
        if (!state.gameOver && !state.current) spawnPiece();
      }, 90);
    }

    // ----- Line clear -----
    function detectAndClearRows() {
      if (state.gameOver) return;
      // Count particles in each row. Row r covers y in [r*CELL_SIZE, (r+1)*CELL_SIZE).
      const counts = new Array(GRID_H).fill(0);
      for (const p of state.pieces) {
        for (const b of p.particles) {
          const row = Math.floor(b.position.y / CELL_SIZE);
          if (row >= 0 && row < GRID_H) counts[row]++;
        }
      }
      const full = [];
      for (let row = 0; row < GRID_H; row++) {
        // A row is full when at least GRID_W particles occupy it. We allow
        // a 1-particle slack to absorb small soft-body drift.
        if (counts[row] >= GRID_W) full.push(row);
      }
      if (full.length === 0) return;
      // Cap at 4 (theoretical Tetris max) — defensive against any stretched
      // soft-body counting regression.
      if (full.length > 4) full.length = 4;

      // Identify particles to remove
      const toRemove = [];
      for (const p of state.pieces) {
        for (const b of p.particles) {
          const row = Math.floor(b.position.y / CELL_SIZE);
          if (full.indexOf(row) !== -1) {
            toRemove.push({ piece: p, body: b });
          }
        }
        // Particles above cleared rows: leave alone, they fall onto the
        // new lower surface via gravity + collisions naturally.
      }

      // Remove constraints referencing removed bodies, then bodies. Use
      // Composite.allConstraints once and skip any whose bodyA/bodyB no
      // longer exists in the world (defensive against stale references).
      const allCons = Composite.allConstraints(state.engine.world);
      for (const c of allCons) {
        if (!c || !c.parent) continue;
        const removeA = c.bodyA && toRemove.some(r => r.body === c.bodyA);
        const removeB = c.bodyB && toRemove.some(r => r.body === c.bodyB);
        if (removeA || removeB) {
          try {
            Composite.remove(state.engine.world, c);
          } catch (e) { /* stale constraint, ignore */ }
        }
      }
      for (const r of toRemove) {
        if (!r.body || !r.body.parent) continue;
        try {
          Composite.remove(r.piece.composite, r.body);
        } catch (e) { /* stale body, ignore */ }
        const idx = r.piece.particles.indexOf(r.body);
        if (idx !== -1) r.piece.particles.splice(idx, 1);
      }
      // Drop pieces that have lost all particles
      state.pieces = state.pieces.filter(p => p.particles.length > 0);

      // Score (standard Tetris)
      const table = [0, 100, 300, 500, 800];
      const cleared = full.length;
      state.score += table[cleared] * state.level;
      state.lines += cleared;
      state.level = Math.min(20, 1 + Math.floor(state.lines / 10));
    }

    // ----- Input handling -----
    // Movement: snap-translate by exactly 1 cell. After Composite.translate,
    // all particles moved by the same delta so constraints remain at rest
    // length (no solver interference). The pre-check rejects the move if it
    // would clip walls or overlap locked particles.
    function moveHorizontal(dir) {
      const piece = state.current;
      if (!piece || piece.locked) return;
      const dx = dir * CELL_SIZE;
      const wallLeft = BOARD_X + PARTICLE_R;
      const wallRight = BOARD_X + BOARD_PX_W - PARTICLE_R;
      // Wall bounds check
      for (const b of piece.particles) {
        const nx = b.position.x + dx;
        if (nx < wallLeft || nx > wallRight) return;
      }
      // Overlap check against locked pieces
      for (const b of piece.particles) {
        for (const p of state.pieces) {
          if (p === piece) continue;
          if (!p.locked) continue;
          for (const o of p.particles) {
            const ddx = (b.position.x + dx) - o.position.x;
            const ddy = b.position.y - o.position.y;
            const rsum = CELL_SIZE * 0.9;
            if (ddx * ddx + ddy * ddy < rsum * rsum) return;
          }
        }
      }
      // Translate. setPosition preserves constraint lengths (all particles
      // moved by same delta), and we explicitly zero velocity so the piece
      // doesn't keep gliding after the keypress.
      for (const b of piece.particles) {
        Body.setPosition(b, { x: b.position.x + dx, y: b.position.y });
        Body.setVelocity(b, { x: 0, y: b.velocity.y });
      }
    }
    function rotateCurrent() {
      const piece = state.current;
      if (!piece || piece.locked) return;
      if (piece.type === 'O') return; // O is symmetric
      // Compute centroid of the piece
      let sx = 0, sy = 0, n = 0;
      for (const b of piece.particles) {
        sx += b.position.x; sy += b.position.y; n++;
      }
      const cx = sx / n, cy = sy / n;
      // Snapshot positions and constraint connections
      const snap = piece.particles.map(b => ({ x: b.position.x, y: b.position.y }));
      // Rotate each particle 90° around the centroid
      for (const b of piece.particles) {
        const dx = b.position.x - cx;
        const dy = b.position.y - cy;
        Body.setPosition(b, { x: cx - dy, y: cy + dx });
      }
      // Rebuild constraint lengths so they don't snap
      const cons = Composite.allConstraints(piece.composite);
      for (const c of cons) {
        const A = c.bodyA, B = c.bodyB;
        const dx = B.position.x - A.position.x;
        const dy = B.position.y - A.position.y;
        c.length = Math.sqrt(dx * dx + dy * dy);
      }
      // Wall kick / undo: if any particle is now outside the walls or below
      // the floor, restore snapshot.
      const wallLeft = BOARD_X + PARTICLE_R;
      const wallRight = BOARD_X + BOARD_PX_W - PARTICLE_R;
      const floorY = BOARD_Y + BOARD_PX_H - PARTICLE_R;
      let clipped = false;
      for (const b of piece.particles) {
        if (b.position.x < wallLeft || b.position.x > wallRight ||
            b.position.y > floorY) {
          clipped = true; break;
        }
      }
      if (clipped) {
        // Wall kick: try shifting horizontally by 1 cell before giving up
        let kicked = false;
        for (const shift of [-CELL_SIZE, CELL_SIZE, -2 * CELL_SIZE, 2 * CELL_SIZE]) {
          for (const b of piece.particles) {
            Body.setPosition(b, { x: snap[b.plugin.pieceIndex].x + shift, y: snap[b.plugin.pieceIndex].y });
          }
          let stillClipped = false;
          for (const b of piece.particles) {
            if (b.position.x < wallLeft || b.position.x > wallRight ||
                b.position.y > floorY) { stillClipped = true; break; }
          }
          if (!stillClipped) { kicked = true; break; }
        }
        if (!kicked) {
          // Restore snapshot
          for (let i = 0; i < piece.particles.length; i++) {
            Body.setPosition(piece.particles[i], { x: snap[i].x, y: snap[i].y });
          }
          for (const c of cons) {
            const A = c.bodyA, B = c.bodyB;
            const dx = B.position.x - A.position.x;
            const dy = B.position.y - A.position.y;
            c.length = Math.sqrt(dx * dx + dy * dy);
          }
        }
      }
    }
    function hardDrop() {
      const piece = state.current;
      if (!piece || piece.locked) return;
      const step = CELL_SIZE * 0.25;
      const maxSteps = GRID_H * 6;
      const floorLimit = BOARD_PX_H - PARTICLE_R;
      const wallLeft = BOARD_X + PARTICLE_R;
      const wallRight = BOARD_X + BOARD_PX_W - PARTICLE_R;
      // Build blocker list: locked pieces' particles only (walls checked directly)
      const others = state.pieces.filter(p => p !== piece && p.locked);
      const blockers = [];
      for (const p of others) for (const b of p.particles) blockers.push(b);
      let stepped = 0;
      for (let i = 1; i <= maxSteps; i++) {
        let conflict = false;
        for (const b of piece.particles) {
          const nx = b.position.x;
          const ny = b.position.y + step;
          // Wall check (x bounds)
          if (nx - PARTICLE_R < wallLeft || nx + PARTICLE_R > wallRight) {
            conflict = true; break;
          }
          // Floor check
          if (ny + PARTICLE_R > floorLimit) { conflict = true; break; }
          // Blocker (locked particle) check
          for (const ob of blockers) {
            const dx = nx - ob.position.x;
            const dy = ny - ob.position.y;
            const rsum = PARTICLE_R * 2 * 0.92;
            if (dx * dx + dy * dy < rsum * rsum) { conflict = true; break; }
          }
          if (conflict) break;
        }
        if (conflict) break;
        for (const b of piece.particles) {
          Body.setPosition(b, { x: b.position.x, y: b.position.y + step });
        }
        stepped = i;
      }
      // If the piece didn't move at all (conflict on the very first step),
      // the spawn column is blocked — this is top-out, end the game.
      if (stepped === 0) {
        endGame();
        return;
      }
      // Lock immediately
      lockPiece(piece);
    }

    function onKeyDown(e) {
      if (state.gameOver) {
        if (e.key === 'r' || e.key === 'R') { restart(); e.preventDefault(); }
        return;
      }
      if (!state.current) return;
      switch (e.key) {
        case 'ArrowLeft':
          moveHorizontal(-1);
          e.preventDefault();
          break;
        case 'ArrowRight':
          moveHorizontal(+1);
          e.preventDefault();
          break;
        case 'ArrowDown':
          state.softDrop = true;
          e.preventDefault();
          break;
        case 'ArrowUp':
        case 'x':
        case 'X':
          rotateCurrent();
          e.preventDefault();
          break;
        case ' ':
          hardDrop();
          e.preventDefault();
          break;
        case 'r':
        case 'R':
          restart();
          e.preventDefault();
          break;
      }
    }
    function onKeyUp(e) {
      if (e.key === 'ArrowDown') state.softDrop = false;
    }

    // ----- Tick loop -----
    let lastFrame = performance.now();
    function tick(now) {
      const dt = Math.min(33, now - lastFrame);
      lastFrame = now;

      if (!state.gameOver) {
        Engine.update(state.engine, 1000 / 60);
        applyGravity();

        // Safety: clamp runaway velocities & pull back escapees. Soft drop
        // uses a higher cap, so honor whichever is in effect.
        const safetyVyCap = (state.softDrop ? MAX_VY_SOFT : MAX_VY) * 1.5;
        for (const piece of state.pieces) {
          for (const b of piece.particles) {
            const v = b.velocity;
            if (v.y > safetyVyCap) Body.setVelocity(b, { x: v.x, y: safetyVyCap });
            if (v.x > MAX_VX * 1.5) Body.setVelocity(b, { x: MAX_VX * 1.5, y: v.y });
            if (v.x < -MAX_VX * 1.5) Body.setVelocity(b, { x: -MAX_VX * 1.5, y: v.y });
            // Pull back wall escapees
            if (b.position.x < BOARD_X - CELL_SIZE) {
              Body.setPosition(b, { x: BOARD_X + PARTICLE_R, y: b.position.y });
            }
            if (b.position.x > BOARD_X + BOARD_PX_W + CELL_SIZE) {
              Body.setPosition(b, { x: BOARD_X + BOARD_PX_W - PARTICLE_R, y: b.position.y });
            }
          }
        }

        // Settle detection — iterate ALL unlocked pieces
        for (const p of state.pieces) {
          if (p.locked) continue;
          if (performance.now() - p.bornAt > 250) {
            tryLockPiece(p);
          }
        }
      }

      render();
      requestAnimationFrame(tick);
    }

    // ----- Renderer -----
    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x <= GRID_W; x++) {
        const px = BOARD_X + x * CELL_SIZE + 0.5;
        ctx.moveTo(px, BOARD_Y);
        ctx.lineTo(px, BOARD_Y + BOARD_PX_H);
      }
      for (let y = 0; y <= GRID_H; y++) {
        const py = BOARD_Y + y * CELL_SIZE + 0.5;
        ctx.moveTo(BOARD_X, py);
        ctx.lineTo(BOARD_X + BOARD_PX_W, py);
      }
      ctx.stroke();
    }

    function drawWalls() {
      const bodies = Composite.allBodies(state.engine.world);
      ctx.fillStyle = '#1a1a2e';
      ctx.strokeStyle = '#2a2a4a';
      ctx.lineWidth = 1;
      for (const b of bodies) {
        if (b.label === 'wall' || b.label === 'floor') {
          const verts = b.vertices;
          ctx.beginPath();
          ctx.moveTo(verts[0].x, verts[0].y);
          for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
      }
    }

    // Render a soft-body piece:
    // 1. For each canonical constraint, draw a thick rounded lozenge
    //    connecting the two particle centers. This is the "skin" of the
    //    jelly — when particles wobble, the lozenges stretch/compress.
    // 2. Draw filled circles at each particle.
    function drawPiece(piece) {
      const color = COLORS[piece.type];

      // Build particle lookup by piece index
      const idxAt = new Map();
      for (const b of piece.particles) idxAt.set(b.plugin.pieceIndex, b);

      // Draw lozenges for each constraint. We use a thick rounded line — the
      // lineCap='round' ends meet the circle fills seamlessly. Width is
      // sized so two adjacent particles overlap visually into one blob when
      // they're at rest distance.
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const [a, b] of piece.shape.constraints) {
        const A = idxAt.get(a);
        const B = idxAt.get(b);
        if (!A || !B) continue;
        // Width scales with distance — when compressed, narrower; when
        // stretched, wider. This exaggerates the jelly effect.
        const dx = B.position.x - A.position.x;
        const dy = B.position.y - A.position.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const restD = CELL_SIZE;
        const stretch = Math.min(1.6, Math.max(0.6, d / restD));
        const w = CELL_SIZE * 0.82 * stretch;
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.85;
        ctx.lineWidth = w;
        ctx.beginPath();
        ctx.moveTo(A.position.x, A.position.y);
        ctx.lineTo(B.position.x, B.position.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Draw particle fills (slightly larger than collision radius for a
      // bold jelly look)
      for (const b of piece.particles) {
        const r = PARTICLE_R;
        // Outer halo
        ctx.fillStyle = color + '55';
        ctx.beginPath();
        ctx.arc(b.position.x, b.position.y, r * 1.18, 0, Math.PI * 2);
        ctx.fill();
        // Main fill
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(b.position.x, b.position.y, r * 0.96, 0, Math.PI * 2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.arc(b.position.x - r * 0.32, b.position.y - r * 0.32, r * 0.28, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function render() {
      // Background
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, BOARD_PX_W, BOARD_PX_H);
      // Grid
      drawGrid();
      // Static walls
      drawWalls();
      // Pieces: locked first, current on top
      for (const p of state.pieces) {
        if (p === state.current) continue;
        if (p.locked) drawPiece(p);
      }
      if (state.current && !state.current.locked) drawPiece(state.current);

      // HUD throttle
      state.hudTimer++;
      if (state.hudTimer > 4) {
        state.hudTimer = 0;
        hudScore.textContent = String(state.score);
        hudLines.textContent = String(state.lines);
        hudLevel.textContent = String(state.level);
      }
    }

    // ----- Next-piece preview -----
    function renderNext() {
      nextCtx.fillStyle = '#0a0a14';
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      const type = state.queue[0];
      if (!type) return;
      const shape = SHAPES[type];
      const color = COLORS[type];
      // Fit the piece into 120x120
      const cellW = nextCanvas.width / shape.w;
      const cellH = nextCanvas.height / shape.h;
      const prevCell = Math.min(cellW, cellH) * 0.85;
      const offX = (nextCanvas.width - shape.w * prevCell) / 2;
      const offY = (nextCanvas.height - shape.h * prevCell) / 2;
      nextCtx.fillStyle = color;
      nextCtx.globalAlpha = 0.65;
      nextCtx.strokeStyle = color;
      nextCtx.lineWidth = 2;
      for (let y = 0; y < shape.h; y++) {
        for (let x = 0; x < shape.w; x++) {
          if (shape.cells[y][x]) {
            const px = offX + x * prevCell;
            const py = offY + y * prevCell;
            nextCtx.beginPath();
            nextCtx.arc(px + prevCell / 2, py + prevCell / 2, prevCell * 0.42, 0, Math.PI * 2);
            nextCtx.fill();
          }
        }
      }
      nextCtx.globalAlpha = 1;
    }

    // ----- Restart -----
    function restart() {
      const allBodies = Composite.allBodies(state.engine.world);
      for (const b of allBodies) Composite.remove(state.engine.world, b);
      const allCons = Composite.allConstraints(state.engine.world);
      for (const c of allCons) Composite.remove(state.engine.world, c);
      state.pieces = [];
      state.current = null;
      state.bag = [];
      state.queue = [];
      state.score = 0;
      state.lines = 0;
      state.level = 1;
      state.softDrop = false;
      state.gameOver = false;
      overlay.classList.remove('on');
      // Rebuild walls
      const wallT = 24;
      const wallH = BOARD_PX_H + 4 * CELL_SIZE;
      const wallY = BOARD_Y + BOARD_PX_H / 2;
      Composite.add(state.engine.world, [
        Bodies.rectangle(BOARD_X - CELL_SIZE / 2 - wallT / 2, wallY, wallT, wallH, { isStatic: true, label: 'wall', friction: 0.2, restitution: 0.05 }),
        Bodies.rectangle(BOARD_X + BOARD_PX_W + CELL_SIZE / 2 + wallT / 2, wallY, wallT, wallH, { isStatic: true, label: 'wall', friction: 0.2, restitution: 0.05 }),
        Bodies.rectangle(BOARD_X + BOARD_PX_W / 2, BOARD_Y + BOARD_PX_H + CELL_SIZE / 2, BOARD_PX_W + 4 * CELL_SIZE + wallT * 2, CELL_SIZE, { isStatic: true, label: 'floor', friction: 0.9, restitution: 0.0 }),
      ]);
      ensureQueue();
      spawnPiece();
    }

    // ----- Boot -----
    function boot() {
      initEngine();
      ensureQueue();
      spawnPiece();
      window.__jelly = state;
      window.addEventListener('keydown', onKeyDown, { passive: false });
      window.addEventListener('keyup', onKeyUp, { passive: true });
      lastFrame = performance.now();
      requestAnimationFrame(function loop(now) {
        tick(now);
        renderNext();
      });
      console.log('[JellyTetris] booted');
    }

    if (typeof Matter === 'undefined') {
      document.body.innerHTML = '<div style="padding:40px;color:#fff;font-family:sans-serif">Failed to load Matter.js. Check your network connection.</div>';
      return;
    }
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      boot();
    } else {
      window.addEventListener('DOMContentLoaded', boot);
    }
  })();
  </script>
</body>
